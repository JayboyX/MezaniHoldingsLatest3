<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Mezani Holdings</title>
    <meta name="description" content="Mezani Holdings provides professional cleaning services for homes and businesses. Get a sparkling clean with our reliable and affordable cleaning solutions.">
    <meta name="keywords" content="cleaning services, home cleaning, business cleaning, professional cleaning, Mezani Holdings">

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="site.webmanifest">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
    <body>
<!-- Navbar -->
<nav class="navbar">
    <div class="navbar-container">
        <a href="index.html#home" class="navbar-logo">
            <img src="assets/logo.webp" alt="Mezani Holdings Logo">
        </a>

            <div class="admin-info">
                <span id="adminUsername"></span>
                <button id="signOutButton">Sign Out</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Inquiries</h3>
                <span id="totalInquiries">0</span>
            </div>
            <div class="stat-card">
                <h3>Answered</h3>
                <span id="answeredInquiries">0</span>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <span id="pendingInquiries">0</span>
            </div>
        </div>

        <div class="inquiries-container">
            <h3>Pending Inquiries</h3>
            <div class="inquiries-list" id="inquiriesList"></div>
        </div>
    </div>

    <!-- Reply Modal -->
    <div id="replyModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Reply to Inquiry</h3>
            <form id="replyForm">
                <textarea id="replyMessage" required></textarea>
                <button type="submit">Send Reply</button>
            </form>
        </div>
    </div>

    <script src="/js/admin-dashboard.js"></script>
        <script src="js/script.js"></script>
</body>
</html>
